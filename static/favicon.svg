<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <style>
    .logo-bg { fill: #1a1a2e; }
    .logo-cross { stroke: #6b7fee; }
    @media (prefers-color-scheme: dark) {
      .logo-bg { fill: #6b7fee; }
      .logo-cross { stroke: #1a1a2e; }
    }
  </style>
  <rect width="96" height="96" rx="20" class="logo-bg"/>
  <line x1="16" y1="48" x2="80" y2="48"
    class="logo-cross" stroke-width="4" stroke-linecap="round"/>
  <line x1="48" y1="16" x2="48" y2="80"
    class="logo-cross" stroke-width="4" stroke-linecap="round"/>
  <text x="48" y="72" text-anchor="middle"
    font-family="Georgia,serif" font-size="68" font-weight="700"
    fill="none" stroke="white" stroke-width="2.5">C</text>
</svg>
