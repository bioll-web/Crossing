baseURL = 'https://bioll-web.github.io/Crossing/'
title = 'Crossing'
theme = 'hugo-book'
defaultContentLanguage = 'zh'

[languages]
  [languages.zh]
    languageName = '简体中文'
    contentDir = 'content/zh'
    weight = 1
  [languages.en]
    languageName = 'English'
    contentDir = 'content/en'
    weight = 2

[params]
  BookFavicon = 'favicon.svg'
  BookTheme = 'dark'
  BookToC = true
  BookSection = 'docs'
  BookSearch = true
  BookMenuBundle = false
  BookCollapseSection = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
