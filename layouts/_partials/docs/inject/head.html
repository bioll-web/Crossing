<script>
(function () {
  var saved = localStorage.getItem('theme-preference');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var initial = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', initial);
})();
</script>

/* ==========================================

 * ≥ 960px  → 桌面端：顶部导航项 + 侧边栏（_custom.scss 控制）

.mobile-search-btn  { display: none; }

.mobile-search-bar[aria-hidden="false"] {

  flex-direction: column;
  position: absolute;
  top: 100%;
  left: 0;

}

@keyframes crossing-fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ══════════════════════════════════════
   移动端（≤ 56rem = 896px）：与主题断点对齐
══════════════════════════════════════ */

</style>

<script>
(function(){
  var s = sessionStorage.getItem('crossing-splash-shown');
  if (s) {
    document.getElementById('crossing-splash').style.display = 'none';
    return;
  }
  sessionStorage.setItem('crossing-splash-shown', '1');
  var bg = document.getElementById('splash-bg');
  var ch = document.getElementById('splash-cross-h');
  var cv = document.getElementById('splash-cross-v');
  var cl = document.getElementById('splash-c');
  var tw = document.getElementById('splash-text');
  var sp = document.getElementById('crossing-splash');
  setTimeout(function(){
    bg.style.opacity = '1';
    bg.style.transform = 'scale(1)';
  }, 300);
  setTimeout(function(){
    ch.style.width = '94px';
    ch.style.opacity = '1';
    cv.style.height = '94px';
    cv.style.opacity = '1';
  }, 900);
  setTimeout(function(){
    cl.style.opacity = '1';
  }, 1500);
  setTimeout(function(){
    tw.style.opacity = '1';
    tw.style.transform = 'translateY(0)';
  }, 2000);
  setTimeout(function(){
    sp.classList.add('fade-out');
  }, 3400);
  setTimeout(function(){
    sp.style.display = 'none';
  }, 4300);
})();
</script>

<script>
(function() {
  document.addEventListener('DOMContentLoaded', function() {
    var mobileSearchBtn = document.querySelector('.mobile-search-btn');
    var mobileSearchBar = document.querySelector('.mobile-search-bar');
    var mobileSearchInput = document.querySelector('.mobile-search-input');
    var mobileSearchClose = document.querySelector('.mobile-search-close');

    function openMobileSearch() {
      if (!mobileSearchBar) return;
      mobileSearchBar.setAttribute('aria-hidden', 'false');
      var bookInput = document.getElementById('book-search-input');
      if (bookInput) bookInput.dispatchEvent(new Event('focus'));
      if (mobileSearchInput) mobileSearchInput.focus();
    }

    function closeMobileSearch() {
      if (!mobileSearchBar) return;
      mobileSearchBar.setAttribute('aria-hidden', 'true');
      if (mobileSearchInput) mobileSearchInput.value = '';
      var mobileResults = mobileSearchBar.querySelector('.mobile-search-results');
      if (mobileResults) mobileResults.innerHTML = '';
    }

    function doMobileSearch() {
      var query = mobileSearchInput ? mobileSearchInput.value.trim() : '';
      var mobileResults = mobileSearchBar ? mobileSearchBar.querySelector('.mobile-search-results') : null;
      if (!mobileResults) return;
      mobileResults.innerHTML = '';
      if (!query) return;
      if (!window.bookSearchIndex) {
        setTimeout(doMobileSearch, 300);
        return;
      }
      var hits = window.bookSearchIndex.search(query).slice(0, 10);
      hits.forEach(function(page) {
        var li = document.createElement('li');
        var a = document.createElement('a');
        var small = document.createElement('small');
        a.href = page.item.href;
        a.textContent = page.item.title;
        small.textContent = page.item.section;
        li.appendChild(a);
        li.appendChild(small);
        mobileResults.appendChild(li);
        a.addEventListener('click', closeMobileSearch);
      });
    }

    if (mobileSearchBtn) mobileSearchBtn.addEventListener('click', openMobileSearch);
    if (mobileSearchClose) mobileSearchClose.addEventListener('click', closeMobileSearch);
    if (mobileSearchInput) mobileSearchInput.addEventListener('input', doMobileSearch);

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeMobileSearch();
    });
  });
})();
</script>
